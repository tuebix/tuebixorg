<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tübix 2026 – Schedule</title>
<style>
  :root {
    --primary: #b81313;
    --primary-light: #d83a3a;
    --primary-dark: #8f0e0e;
    --accent: #b81313;
    --dark: #2b2b2b;
    --live: #b81313;
    --bg: #ffffff;
    --bg-grad: #ffffff;
    --card-bg: #fdecec;
    --card-bg-next: #f4f4f4;
    --text: #2b2b2b;
    --text-dim: #5a5a5a;
    --text-faint: #9a9a9a;
    --border: #e0e0e0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  }

  /* 16:9 stage */
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    /* keep 16:9 within the viewport, centered */
    aspect-ratio: 16 / 9;
    max-width: calc(100vh * 16 / 9);
    max-height: calc(100vw * 9 / 16);
    margin: auto;
    display: flex;
    flex-direction: column;
    padding: 1.6vh 1.8vw;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex: 0 0 auto;
    padding-bottom: 1.2vh;
    border-bottom: 3px solid var(--primary);
    margin-bottom: 1.4vh;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 1.2vw;
  }
  .brand img {
    height: 7vh;
    width: auto;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  }
  .brand .titles h1 {
    font-size: 3.4vh;
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1.1;
    color: var(--dark);
  }
  .brand .titles .sub {
    font-size: 1.7vh;
    color: var(--text-dim);
    margin-top: 0.3vh;
  }

  .clock {
    text-align: right;
  }
  .clock .time {
    font-size: 4.2vh;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    line-height: 1;
  }
  .clock .date {
    font-size: 1.7vh;
    color: var(--text-dim);
    margin-top: 0.4vh;
  }

  /* room grid */
  #grid {
    flex: 1 1 auto;
    display: grid;
    gap: 1.1vh 1.0vw;
    min-height: 0;
  }

  .room {
    background: #ffffff;
    border: 1.5px solid var(--border);
    border-radius: 0.9vh;
    padding: 1.0vh 1.1vw;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  .room-name {
    font-size: 2.0vh;
    font-weight: 700;
    color: var(--primary);
    padding-bottom: 0.7vh;
    margin-bottom: 0.8vh;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.6vw;
    flex: 0 0 auto;
  }

  .slot {
    border-radius: 0.7vh;
    padding: 0.8vh 0.9vw;
    margin-bottom: 0.7vh;
    border-left: 0.45vw solid transparent;
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }
  .slot:last-child { margin-bottom: 0; }

  .slot.now {
    background: var(--card-bg);
    border-left-color: var(--primary);
  }
  .slot.next {
    background: var(--card-bg-next);
    border-left-color: var(--dark);
    opacity: 1;
  }
  .slot.empty {
    background: #fafafa;
    border-left-color: var(--border);
    justify-content: center;
    align-items: center;
    color: var(--text-faint);
    font-size: 1.6vh;
    font-style: italic;
  }

  .slot-head {
    display: flex;
    align-items: center;
    gap: 0.6vw;
    margin-bottom: 0.5vh;
    flex: 0 0 auto;
  }
  .badge {
    font-size: 1.25vh;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 0.25vh 0.6vw;
    border-radius: 0.5vh;
    white-space: nowrap;
  }
  .badge.now {
    background: var(--primary);
    color: #ffffff;
  }
  .badge.next {
    background: var(--dark);
    color: #ffffff;
  }
  .slot-time {
    font-size: 1.5vh;
    font-weight: 600;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .live-dot {
    width: 1.0vh;
    height: 1.0vh;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 0 0 rgba(184,19,19,0.7);
    animation: pulse 1.8s infinite;
    flex: 0 0 auto;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(184,19,19,0.6); }
    70%  { box-shadow: 0 0 0 1.2vh rgba(184,19,19,0); }
    100% { box-shadow: 0 0 0 0 rgba(184,19,19,0); }
  }

  .slot-title {
    font-size: 1.85vh;
    font-weight: 600;
    line-height: 1.2;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .slot.next .slot-title { font-size: 1.7vh; }

  .slot-meta {
    margin-top: 0.5vh;
    font-size: 1.4vh;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 0.6vw;
    flex-wrap: wrap;
    flex: 0 0 auto;
  }
  .slot-speaker {
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .track-tag {
    font-size: 1.2vh;
    padding: 0.15vh 0.5vw;
    border-radius: 0.4vh;
    font-weight: 600;
    white-space: nowrap;
  }

  footer {
    flex: 0 0 auto;
    margin-top: 1.0vh;
    padding-top: 0.8vh;
    border-top: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 1.4vh;
    color: var(--text-faint);
  }
  .legend { display: flex; gap: 1.4vw; align-items: center; }
  .legend span { display: flex; align-items: center; gap: 0.4vw; }
  .legend .swatch {
    width: 1.2vh; height: 1.2vh; border-radius: 0.3vh; display: inline-block;
  }
  .sw-now  { background: var(--primary); }
  .sw-next { background: var(--dark); }

  #status { display: flex; align-items: center; gap: 0.5vw; }

  /* loading / error overlay */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2vh;
    background: var(--bg);
    z-index: 10;
    text-align: center;
    padding: 4vw;
  }
  #overlay.hidden { display: none; }
  #overlay img { height: 14vh; }
  #overlay .msg { font-size: 2.4vh; color: var(--dark); font-weight: 600; }
  #overlay .sub { font-size: 1.7vh; color: var(--text-dim); max-width: 60vw; }
  .spinner {
    width: 6vh; height: 6vh;
    border: 0.6vh solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="stage">
  <header>
    <div class="brand">
      <img src="https://www.tuebix.org/images/tuebix/tuebix_logo_with_pingu.svg" alt="Tübix Logo"
           onerror="this.style.display='none'">
      <div class="titles">
        <h1 id="conf-title">Tübix 2026</h1>
        <div class="sub" id="conf-sub">Aktuelles Programm</div>
      </div>
    </div>
    <div class="clock">
      <div class="time" id="clock-time">--:--</div>
      <div class="date" id="clock-date">—</div>
    </div>
  </header>

  <div id="grid"></div>

  <footer>
    <div class="legend">
      <span><i class="swatch sw-now"></i> Läuft gerade</span>
      <span><i class="swatch sw-next"></i> Als nächstes</span>
    </div>
    <div id="status">Lade Daten…</div>
  </footer>

  <div id="overlay">
    <img src="https://www.tuebix.org/images/tuebix/tuebix_logo_with_pingu.svg" alt="Tübix"
         onerror="this.style.display='none'">
    <div class="spinner"></div>
    <div class="msg">Lade Programm…</div>
    <div class="sub" id="overlay-sub">Verbinde mit cfp.tuebix.org</div>
  </div>
</div>

<script>
const SCHEDULE_URL = "https://cfp.tuebix.org/tuebix-2026/schedule/export/schedule.json";
const REFRESH_MS   = 60 * 1000;   // Daten alle 60s neu laden
const TICK_MS      = 10 * 1000;   // Anzeige alle 10s aktualisieren

let scheduleData = null;
let tracksByName = {};

// --- Zeit-Helfer -----------------------------------------------------------
function parseISO(s) { return new Date(s); }

function hhmm(date) {
  return date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
}

function durationToMs(dur) {
  // "HH:MM"
  const [h, m] = dur.split(":").map(Number);
  return ((h * 60) + m) * 60 * 1000;
}

// --- Datenaufbereitung -----------------------------------------------------
function buildRooms(data) {
  const conf = data.schedule.conference;
  tracksByName = {};
  (conf.tracks || []).forEach(t => { tracksByName[t.name] = t.color; });

  // Räume in definierter Reihenfolge
  const roomOrder = (conf.rooms || []).map(r => r.name);

  // Alle Talks pro Raum über alle Tage sammeln
  const roomTalks = {};
  roomOrder.forEach(r => roomTalks[r] = []);

  (conf.days || []).forEach(day => {
    const rooms = day.rooms || {};
    Object.keys(rooms).forEach(roomName => {
      if (!roomTalks[roomName]) roomTalks[roomName] = [];
      rooms[roomName].forEach(talk => {
        const start = parseISO(talk.date);
        const end = new Date(start.getTime() + durationToMs(talk.duration || "00:00"));
        roomTalks[roomName].push({
          title: talk.title,
          start, end,
          startStr: hhmm(start),
          endStr: hhmm(end),
          persons: (talk.persons || []).map(p => p.public_name || p.name).join(", "),
          track: talk.track,
          trackColor: talk.track ? tracksByName[talk.track] : null
        });
      });
    });
  });

  Object.keys(roomTalks).forEach(r =>
    roomTalks[r].sort((a, b) => a.start - b.start)
  );

  return { order: roomOrder.length ? roomOrder : Object.keys(roomTalks), talks: roomTalks };
}

function pickNowNext(talks, now) {
  let current = null, next = null;
  for (const t of talks) {
    if (t.start <= now && now < t.end) { current = t; }
    else if (t.start > now) { if (!next) next = t; }
  }
  // Falls kein laufender Talk, aber der nächste schon als "next" gesetzt – ok.
  return { current, next };
}

// --- Rendering -------------------------------------------------------------
function escapeHtml(s) {
  return (s || "").replace(/[&<>"]/g, c =>
    ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
}

function slotHtml(talk, kind) {
  if (!talk) {
    const label = kind === "now" ? "Aktuell kein Vortrag" : "Kein weiterer Vortrag";
    return `<div class="slot empty">${label}</div>`;
  }
  const badge = kind === "now"
    ? `<span class="badge now">Jetzt</span><span class="live-dot"></span>`
    : `<span class="badge next">Gleich</span>`;

  const track = talk.track
    ? `<span class="track-tag" style="background:${talk.trackColor || '#888'}33;color:${talk.trackColor || '#ccc'};">${escapeHtml(talk.track)}</span>`
    : "";

  const speaker = talk.persons
    ? `<span class="slot-speaker">${escapeHtml(talk.persons)}</span>` : "";

  return `
    <div class="slot ${kind}">
      <div class="slot-head">
        ${badge}
        <span class="slot-time">${talk.startStr}–${talk.endStr}</span>
      </div>
      <div class="slot-title">${escapeHtml(talk.title)}</div>
      <div class="slot-meta">${speaker}${track}</div>
    </div>`;
}

function render() {
  if (!scheduleData) return;
  const now = new Date();

  // Uhr
  document.getElementById("clock-time").textContent = hhmm(now);
  document.getElementById("clock-date").textContent =
    now.toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

  const { order, talks } = scheduleData;
  const grid = document.getElementById("grid");

  // Spaltenanzahl an Raumzahl anpassen für 16:9
  const n = order.length;
  let cols = Math.ceil(Math.sqrt(n * (16/9)));
  cols = Math.min(Math.max(cols, 1), 4);
  const rows = Math.ceil(n / cols);
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  grid.innerHTML = order.map(roomName => {
    const list = talks[roomName] || [];
    const { current, next } = pickNowNext(list, now);
    return `
      <div class="room">
        <div class="room-name"><span>${escapeHtml(roomName)}</span></div>
        ${slotHtml(current, "now")}
        ${slotHtml(next, "next")}
      </div>`;
  }).join("");
}

// --- Laden -----------------------------------------------------------------
async function loadSchedule(initial = false) {
  try {
    const res = await fetch(SCHEDULE_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    scheduleData = buildRooms(data);

    const conf = data.schedule.conference;
    document.getElementById("conf-title").textContent = conf.title || "Tübix";
    document.getElementById("conf-sub").textContent =
      "Programm · Version " + (data.schedule.version || "");

    document.getElementById("overlay").classList.add("hidden");
    document.getElementById("status").textContent =
      "Aktualisiert: " + hhmm(new Date());

    render();
  } catch (err) {
    console.error(err);
    if (initial && !scheduleData) {
      const ov = document.getElementById("overlay");
      ov.classList.remove("hidden");
      ov.querySelector(".spinner").style.display = "none";
      ov.querySelector(".msg").textContent = "Programm konnte nicht geladen werden";
      document.getElementById("overlay-sub").innerHTML =
        "Fehler: " + escapeHtml(err.message) +
        "<br><br>Bei lokaler Nutzung kann CORS den Zugriff blockieren.<br>" +
        "Diese Seite am besten über einen Webserver / im Netz ausliefern.";
    }
    document.getElementById("status").textContent =
      "Letzter Ladefehler: " + hhmm(new Date());
  }
}

// Init
loadSchedule(true);
setInterval(() => loadSchedule(false), REFRESH_MS);
setInterval(render, TICK_MS);
// Uhr jede Sekunde fein nachziehen (nur Anzeige)
setInterval(() => {
  if (!scheduleData) return;
  const now = new Date();
  document.getElementById("clock-time").textContent = hhmm(now);
}, 1000);
</script>
</body>
</html>
